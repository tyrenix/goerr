name: CI

on:
    pull_request:
        branches: [main, dev]
    push:
        branches: [main]

jobs:
    scenarios-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: 1.24.0
            - run: go mod download
            - run: go test -v -cover -coverpkg=./... -coverprofile=coverage.out ./tests/scenarios/...
            - run: go tool cover -html=coverage.out -o coverage.html
            - uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: coverage.html
