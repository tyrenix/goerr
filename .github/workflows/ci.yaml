name: CI

on:
    pull_request:
        branches: [main, dev]
    push:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
            - run: go mod download
            - name: Test all packages
              run: go test ./...
            - name: Build coverage without examples
              run: |
                  PKGS=$(go list ./... | grep -v '/examples/')
                  COVERPKG=$(echo "$PKGS" | paste -sd , -)
                  go test -v -cover -coverpkg="$COVERPKG" -coverprofile=coverage.out $PKGS
            - run: go tool cover -html=coverage.out -o coverage.html
            - uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: coverage.html
